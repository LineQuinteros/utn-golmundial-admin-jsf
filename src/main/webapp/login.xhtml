<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets">

<ui:composition template="/WEB-INF/templates/layout.xhtml">
    <ui:define name="titulo">Iniciar Sesión</ui:define>
    <ui:define name="cabecera">Iniciar Sesión</ui:define>

    <ui:define name="contenido">
        <div class="login-container">
            <div class="login-card">
                <div class="login-header">
                    <div class="login-icon">⚽</div>
                    <h2>UTN GolMundial</h2>
                    <p>Panel Administrativo</p>
                </div>

                <div class="login-body">
                    <h:form id="formLogin">
                        <div class="form-group">
                            <h:outputLabel for="username" value="Usuario"/>
                            <h:inputText id="username" 
                                         value="#{loginBean.username}" 
                                         required="true"
                                         requiredMessage="El usuario es obligatorio."/>
                            <h:message for="username" styleClass="msg-error"/>
                        </div>

                        <div class="form-group">
                            <h:outputLabel for="password" value="Contraseña"/>
                            <h:inputSecret id="password" 
                                           value="#{loginBean.password}" 
                                           required="true"
                                           requiredMessage="La contraseña es obligatoria."/>
                            <h:message for="password" styleClass="msg-error"/>
                        </div>

                        <div class="login-actions">
                            <h:commandButton value="Ingresar" 
                                             styleClass="btn btn-primary btn-block" 
                                             action="#{loginBean.ingresar()}"/>
                        </div>
                    </h:form>
                </div>

                <div class="login-footer">
                    <p>© 2026 UTN GolMundial - Universidad Técnica del Norte</p>
                </div>
            </div>
        </div>
    </ui:define>
</ui:composition>
</html>
